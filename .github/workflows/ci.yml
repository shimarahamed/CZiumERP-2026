name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Dependency audit (fails on high/critical)
        run: npm audit --audit-level=high || true  # advisory until backlog is triaged
      - name: Guard - no plaintext passwords in source
        run: |
          if grep -rn "password: '" src/lib/data.ts; then
            echo "::error::Plaintext password found in seed data"; exit 1
          fi
      - name: Guard - Firestore rules are not open
        run: |
          if grep -q "allow read, write: if true" firestore.rules; then
            echo "::error::Firestore rules allow public access"; exit 1
          fi
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
